<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Activity 5</title>
    <link rel="stylesheet" href="design.css" />
  </head>
  <body>
    <div class="quote-card">
      <blockquote>
        "The best ways to learn CSS is to break things and rebuild them."
      </blockquote>
      <cite> - a wise developer </cite>
    </div>
    <br>
    <div class="stats">
      <div class="stat">
        <span class="num">128</span>
        <span class="label">PROJECTS</span>
      </div>
      <div class="stat">
        <span class="num">4.9✭</span>
        <span class="label">RATING</span>
      </div>
      <div class="stat">
        <span class="num">99%</span>
        <span class="label">UPTIME</span>
      </div>
    </div>
    <br>
    <div class="field">
        <label for="email">Email Address</label>
        <input type="email" id="email"></input>
        <span class="helper">We'll never share your email</span>
    </div>
    <br>
    <div class="banner">
        <h2>Make it Beautiful</h2>
        <p>CSS gradients can be applied to text, not just backgrounds</p>
    </div>
  </body>
</html>
