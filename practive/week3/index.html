<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity 7</title>
    <style>
        .challenge01 .container{
            display: flex;
            justify-content: space-evenly;
            text-align: center;
        }
        .challenge01 .box{
            width: 100px;
            border: 1px solid #000000
        }

        .challenge02 .container{
            display: flex;
            flex-direction:column;
            justify-content: center;
            text-align: center;
        }

        .challenge02 .box{
            box-sizing: border-box;
            margin: 4px;
            border: 1px solid #000000 
        }
        
        .challenge03 .container{
            display: flex;
            flex-direction:row;
            align-items: flex-end;  
            margin: 4px;
            text-align: center;
            
        }

        .challenge03 .short{
            height: 20px;
            width: 20px;
            border: 1px solid #000000;
            
        }
        .challenge03 .tall{
            height: 60px;
            width: 20px;
            border: 1px solid #000000;
        }
        .challenge03 .medium{
            height: 40px;
            width: 20px;
            border: 1px solid #000000;
        }

        .challenge04 .container{
            display: flex;
            flex-wrap: wrap;
            width: 360px;
            text-align: center;
            gap: 10px;;
        }

        .challenge04 .card{
            width: 100px;
            box-sizing: border-box;
            border: 1px solid #000000;
        }


    </style>
</head>
<body>
    <div class="challenge01">
        <div class="container">
            <div class="box">1</div>
            <div class="box">2</div>
            <div class="box">3</div>
        </div>
    </div>

    <div class="challenge02">
        <div class="container">
            <div class="box">1</div>
            <div class="box">2</div>
            <div class="box">3</div>
        </div>
    </div>

    <div class="challenge03">
        <div class="container">
            <div class="box short">1</div>
            <div class="box tall">2</div>
            <div class="box medium">3</div>
        </div>
    </div>

    <div class="challenge04">
        <div class="container">
            <div class="card">1</div>
            <div class="card">2</div>
            <div class="card">3</div>
            <div class="card">4</div>
            <div class="card">5</div>
        </div>
    </div>
    
</body>
</html>
