<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Activity 8</title>
    <link rel="stylesheet" href="design.css">
  </head>
  <body>
    <!--PROFILE CARD-->
    <div class="profile-card">
      <div class="initials">JD</div>
      <p class="name">Jane Dela Cruz</p>
      <p class="role">UIUX Designer</p>
    </div>

    <!--PRICING CARD ROW-->
    <div class="pricing-card">
      <div class="card one">
        <div class="tier">basic</div>
        <div class="price">$299<span class="period">/mo</span></div>
      </div>
      <div class="card two">
        <div class="tier">pro</div>
        <div class="price">$599<span class="period">/mo</span></div>
      </div>
      <div class="card three">
        <div class="tier">premium</div>
        <div class="price">$999<span class="period">/mo</span></div>
      </div>
    </div>

    <!--NAVIGATOR BAR-->
    <nav class="nav-bar">
      <div class="logo">Brandly</div>
      <ul class="links">
        <li href="#">Home</li>
        <li href="#">About</li>
        <li href="#">Services</li>
      </ul>
      <button class="sign-up">Sign Up</button>
    </nav>

    <!--COMMENT BLOCK-->
    <div class="comment-block">
      <div class="avatar">MR</div>
      <div class="header">
        <div class="commenter">Mark Reyes</div>
        <p class="comment">
          This tutorial finally made flexbox click for me. The visual examples
          really helped - thanks!
        </p>
      </div>
    </div>

    <!--WRAPPING TAG LIST-->
    <div class="container">
      <span class="tag">HTML</span>
      <span class="tag">CSS</span>
      <span class="tag">JavaScript</span>
      <span class="tag">Flexbox</span>
      <span class="tag">Responsive Design</span>
      <span class="tag">Git</span>
    </div>
  </body>
</html>
