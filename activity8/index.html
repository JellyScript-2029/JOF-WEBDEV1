<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Activity 8</title>
    <style>
      .card {
        text-align: center;
        width: 180px;
        font-family: Arial, Helvetica, sans-serif;
        padding: 30px 10px;
        border: 1px solid gray;
        border-radius: 10px;
      }
      .initials {
        background-color: rgb(85, 85, 241);
        color: #ffffff;
        font-size: 15px;
        padding: 15px;
        border-radius: 40px;
      }
      .name {
        font-weight: bold;
        font-size: 15px;
      }

      .role {
        color: gray;
        font-size: 13px;
        line-height: 5%;
      }

      .basic, .pro, .premium{
        display: inline-block;
        justify-content: center;
        text-align: center;
        width: 100px;
        height: 60px;
        font-family: Arial, Helvetica, sans-serif;
        padding: 20px;
        border: 1px solid gray;
        border-radius: 15px;
      }
    </style>
  </head>
  <body>
    <!--PROFILE CARD-->
    <div class="card">
      <span class="initials">JF</span>
      <p class="name">Jhelianne Figuerres</p>
      <p class="role">UIUX Designer</p>
    </div>
    <!--PRICING CARD ROW-->
    <div class="pricing-card">
      <div class="basic">
        basic
        <div class="price">$299<span class="period">/mo</span></div>
      </div>
      <div class="pro">
        pro
        <div class="price">$299<span class="period">/mo</span></div>
      </div>
      <div class="premium">
        premium
        <div class="price">$299<span class="period">/mo</span></div>
      </div>
    </div>
  </body>
</html>
