<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Activity 8</title>
    <style>
      .profile {
        text-align: center;
        font-family: Verdana;
        padding: 20px;
        border: 1px solid gray;
        border-radius: 10px;
        width: 150px;
      }
      .initials {
        background-color: rgb(85, 85, 241);
        color: #ffffff;
        font-size: 15px;
        padding: 15px;
        border-radius: 40px;
      }
      .name {
        font-weight: bold;
        font-size: 15px;
      }
      .role {
        color: gray;
        font-size: 13px;
      }

      .pricing-card{
        display: flex;
        justify-content: center;
        gap: 7px;
        margin: 12px;
      }

      .card{
        text-align: center;
        width: 130px;
        font-family: Verdana;
        padding: 30px 10px;
        border: 1px solid gray;
        border-radius: 10px;
      }

      .tier{
        color: gray;
        text-transform: uppercase;
        font-size: 0.60rem;
        margin-bottom: 10px;
      }
      .period{
        color: gray;
        font-size: 0.75rem;
      }

      .price{
        font-weight: bold;
        font-size: 1.5rem;
      }

      

      

      
    </style>
  </head>
  <body>
    <!--PROFILE CARD-->
    <div class="profile">
      <span class="initials">JD</span>
      <p class="name">Jane Dela Cruz</p>
      <p class="role">UIUX Designer</p>
    </div>
    <!--PRICING CARD ROW-->
    <div class="pricing-card">
      <div class="card one">
        <div class="tier">basic</div>
        <div class="price">$299<span class="period">/mo</span></div>
      </div>
      <div class="card two">
        <div class="tier">pro</div>
        <div class="price">$599<span class="period">/mo</span></div>
      </div>
      <div class="card three">
        <div class="tier">premium</div>
        <div class="price">$999<span class="period">/mo</span></div>
      </div>
    </div>
  </body>
</html>
